<!DOCTYPE html>
<html>
<head>
    <title>Pedidos</title>

    <style>
        body{
            font-family:Arial;
            background:#f8f1e7;
            padding:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#5d4037;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        h1{
            color:#5d4037;
        }
    </style>
</head>

<body>

<h1>Pedidos Registrados</h1>

<div style="margin-bottom:20px;">
    <a href="/dashboard">
        ← Volver a Administrar Productos
    </a>
</div>

<table>

<tr>
    <th>ID</th>
    <th>Cliente</th>
    <th>Dirección</th>
    <th>Celular</th>
    <th>Pago</th>
</tr>

{% for pedido in pedidos %}

<tr>
    <td>{{ pedido.id }}</td>
    <td>{{ pedido.nombre }}</td>
    <td>{{ pedido.direccion }}</td>
    <td>{{ pedido.celular }}</td>
    <td>{{ pedido.metodo_pago }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
